<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>3D Tic Tac Toe!</title>
	<link rel="stylesheet" type="text/css" href="./index.css">
	<script src="./index.js"></script>
</head>

<body>
	<audio id="place" src="assets/sound/place.ogg" preload="auto"></audio>
	<audio id="error" src="assets/sound/error.ogg" preload="auto"></audio>

			<p>Send the link below to your opponent to begin playing!</p>

				onclick="document.getElementById('share-link').select();document.execCommand('copy');">Copy
				link</button>

		</div>
	</div>
	<div id="wrap">
		<div id="playfield">
			<div class="layer one">
				<table class="grid">
					<tr>

						</td>

						</td>
					</tr>
				</table>
			</div>
			<div class="layer two">
				<table class="grid">
					<tr>
						<td>
							<div class="button">&nbsp;</div>
						</td>
						<td>
							<div class="button">&nbsp;</div>
						</td>
						<td>
							<div class="button">&nbsp;</div>

					</tr>
					<tr>

						</td>

							<div class="button">&nbsp;</div>
						</td>
					</tr>
				</table>
			</div>
